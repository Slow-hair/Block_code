<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Blokcode</title>
    <link rel="stylesheet" href="lable.css">
</head>

<body>
    <header>
        <h1>Blokcode</h1>
    </header>

    <div class="container">
        <div class="blocks-palette" ondragover="event.preventDefault()" ondrop="dropOnLeftZone(event)">
            <div class="block block-declaration" draggable="true" data-type="declaration" ondragstart="move(event)">
                int <span contenteditable="true" class="var-list">x, y</span>
            </div>
            <div class="block block-assignment" draggable="true" data-type="assign" ondragstart="move(event)">
                set <span contenteditable="true" class="var-name">x</span> =
                <div class="slot expr-slot" data-accept="expression"></div>
            </div>
            <div class="block block-operation" draggable="true" data-type="operation" ondragstart="move(event)">
                <div class="slot left-slot" data-accept="expression"></div>
                <select class="operator">
                    <option value="add">+</option>
                    <option value="subtract">-</option>
                    <option value="multiply">*</option>
                    <option value="divide">/</option>
                    <option value="mod">%</option>
                </select>
                <div class="slot right-slot" data-accept="expression"></div>
            </div>
            <div class="block block-number" draggable="true" data-type="number" ondragstart="move(event)">
                <span contenteditable="true" class="number-value">0</span>
            </div>
            <div class="block block-string" draggable="true" data-type="string" ondragstart="move(event)">
                <span contenteditable="true" class="string-value">введите текст</span>
            </div>
            <div class="block block-variable" draggable="true" data-type="variable" ondragstart="move(event)">
                <span contenteditable="true" class="var-name">x</span>
            </div>
            <div class="block block-condition" draggable="true" data-type="if" ondragstart="move(event)">
                <div class="condition-row">
                    <div class="slot left-slot" data-accept="expression"></div>
                    <select class="comparison">
                        <option value="eq">==</option>
                        <option value="neq">!=</option>
                        <option value="gt">></option>
                        <option value="lt"><</option>
                        <option value="gte">>=</option>
                        <option value="lte"><=</option>
                    </select>
                    <div class="slot right-slot" data-accept="expression"></div>
                </div>
                <div class="then-block">
                    <strong>then:</strong>
                    <div class="slot then-slot" data-accept="statement"></div>
                </div>
                <div class="else-block">
                    <strong>else:</strong>
                    <div class="slot else-slot" data-accept="statement"></div>
                </div>
            </div>
            <div class="block block-output" draggable="true" data-type="output" ondragstart="move(event)">
                вывод:
                <div class="slot expr-slot" data-accept="expression"></div>
            </div>
            <div class="block block-while" draggable="true" data-type="while" ondragstart="move(event)">
                <div>пока</div>
                <div class="slot condition-slot" data-accept="expression"></div>
                <div>выполнять</div>
                <div class="slot body-slot" data-accept="statement"></div>
            </div>
            <div class="block block-for" draggable="true" data-type="for" ondragstart="move(event)">
                <div>для</div>
                <div class="slot init-slot" data-accept="statement">инициализация</div>
                <div>пока</div>
                <div class="slot condition-slot" data-accept="expression"></div>
                <div>шаг</div>
                <div class="slot step-slot" data-accept="statement"></div>
                <div>выполнять</div>
                <div class="slot body-slot" data-accept="statement"></div>
            </div>
        </div>
        
        <div class="block-zone" ondragover="event.preventDefault()" ondrop="drop(event)" id="block_zone"></div>
    </div>

    <div class="output-panel">
        <button class="run-button" onclick="runCode()">Запустить</button>
        <div class="output-area" id="output_area">
            <p>Результат:</p>
            <div id="result_display"></div>
        </div>
    </div>

    <script src="script_1.js"></script>
</body>
</html>
