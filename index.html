<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blokcode</title>
    <link rel="stylesheet" href="lable.css">
</head>
<body>
    <header>
        <h1>Blokcode</h1>
    </header>

    <div class="container">
        <div class="blocks-palette">
            <div class="block block-assignment" draggable="true" ondragstart="move(event)">Присваивание</div>
            <div class="block block-operation" draggable="true" ondragstart="move(event)">число + число</div>
            <div class="block block-operation" draggable="true" ondragstart="move(event)">число - число</div>
            <div class="block block-operation" draggable="true" ondragstart="move(event)">число * число</div>
            <div class="block block-operation" draggable="true" ondragstart="move(event)">число / число</div>
            <div class="block block-condition" draggable="true" ondragstart="move(event)">Если то</div>
        </div>
        <div class="block-zone" 
             ondragover="event.preventDefault()" 
             ondrop="drop(event)"
             id="block_zone">
        </div>
        <div class="output-panel">
            <button class="run-button" onclick="runCode()">Запустить</button>
            <div class="output-area" id="output_area">
                <p>Результат:</p>
                <div id="result_display"></div>
            </div>
        </div>
    </div>

    <script src="script_1.js"></script>
</body>
</html>
